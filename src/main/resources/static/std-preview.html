<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>文档生成预览 - 软件测试说明</title>
  <style>
    :root {
      --bg-1: #f2f5ef;
      --bg-2: #e6eef2;
      --ink: #1e1e1e;
      --muted: #5c6775;
      --panel: #ffffff;
      --line: #d7dde4;
      --accent: #1b6f86;
      --good: #2d7d4e;
      --shadow: 0 12px 30px rgba(20, 30, 40, 0.14);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Noto Sans SC", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background: linear-gradient(150deg, var(--bg-1), var(--bg-2));
      min-height: 100vh;
    }

    .page {
      max-width: 1200px;
      margin: 28px auto 60px;
      padding: 0 20px;
      animation: fadeIn 650ms ease-out both;
    }

    .header {
      background: var(--panel);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px 24px;
      display: grid;
      gap: 6px;
      position: relative;
      overflow: hidden;
    }

    .header::after {
      content: "";
      position: absolute;
      inset: auto -10% -50% auto;
      width: 320px;
      height: 320px;
      background: radial-gradient(circle at 30% 30%, #d7efe7, #f3f1d0, transparent 70%);
      opacity: 0.5;
      border-radius: 50%;
    }

    .title {
      font-size: 24px;
    }

    .meta {
      color: var(--muted);
      font-size: 13px;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .btn {
      border: 1px solid var(--line);
      background: #fff;
      padding: 8px 14px;
      border-radius: 10px;
      font-size: 13px;
      cursor: pointer;
      transition: transform 120ms ease, box-shadow 120ms ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(30, 30, 30, 0.12);
    }

    .btn.primary {
      background: var(--accent);
      color: #fff;
      border-color: transparent;
    }

    .preview-shell {
      margin-top: 18px;
      display: grid;
      gap: 18px;
    }

    .preview {
      background: var(--panel);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
      animation: fadeUp 800ms ease-out both;
    }

    .page-frame {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 18px 20px;
      background: #fcfcfd;
      min-height: 520px;
      position: relative;
      overflow: hidden;
    }

    .page-frame::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: linear-gradient(90deg, rgba(220, 228, 236, 0.2) 1px, transparent 1px),
        linear-gradient(rgba(220, 228, 236, 0.2) 1px, transparent 1px);
      background-size: 24px 24px;
      opacity: 0.25;
      pointer-events: none;
    }

    .doc {
      position: relative;
      z-index: 1;
      font-size: 14px;
      line-height: 1.6;
      background: #ffffff;
      border-radius: 10px;
      padding: 16px;
      box-shadow: inset 0 0 0 1px #e5e7eb;
      min-height: 460px;
    }

    .preview-frame {
      width: 100%;
      height: 460px;
      border: none;
      border-radius: 8px;
      background: #ffffff;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 13px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 12px;
      background: rgba(45, 125, 78, 0.12);
      color: var(--good);
      font-size: 12px;
      font-weight: 600;
    }

    .list-panel {
      background: var(--panel);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .list-panel h3 {
      margin: 0 0 10px;
      font-size: 15px;
      color: var(--muted);
    }

    .doc-list {
      display: grid;
      gap: 8px;
    }

    .doc-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fafafa;
    }

    .doc-name {
      font-weight: 600;
      font-size: 13px;
    }

    .doc-meta {
      color: var(--muted);
      font-size: 12px;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <header class="header">
      <div class="title">文档生成预览 - 软件测试说明 (STD)</div>
      <div class="meta" id="metaText">项目：-- · 生成时间：-- · 模板：--</div>
      <div class="toolbar">
        <button class="btn" id="refreshBtn">刷新列表</button>
        <a class="btn primary" href="/" target="_blank">返回生成页</a>
      </div>
    </header>

    <section class="preview-shell">
      <div class="preview">
        <div class="page-frame">
          <div class="doc" id="previewContent">
            <p style="color: var(--muted);">请选择左侧文档进行预览。</p>
          </div>
        </div>

        <div class="footer">
          <div class="status" id="statusText">✅ 等待选择文档</div>
          <div class="toolbar">
            <a class="btn" id="downloadBtn" href="#" style="display:none;">下载 .docx</a>
            <button class="btn" id="openPreviewBtn" style="display:none;">重新渲染预览</button>
          </div>
        </div>
      </div>

      <div class="list-panel">
        <h3>历史文档</h3>
        <div class="doc-list" id="docList">
          <div style="color: var(--muted);">暂无文档</div>
        </div>
      </div>
    </section>
  </div>

  <script>
    const docList = document.getElementById('docList');
    const previewContent = document.getElementById('previewContent');
    const statusText = document.getElementById('statusText');
    const downloadBtn = document.getElementById('downloadBtn');
    const openPreviewBtn = document.getElementById('openPreviewBtn');
    const metaText = document.getElementById('metaText');

    let currentDoc = null;
    let currentBlobUrl = null;

    document.getElementById('refreshBtn').addEventListener('click', loadDocuments);
    openPreviewBtn.addEventListener('click', () => {
      if (currentDoc) {
        renderPreview(currentDoc.fileName, currentDoc.id);
      }
    });

    async function loadDocuments() {
      try {
        const response = await fetch('/api/documents/list');
        const data = await response.json();
        if (!data.documents || data.documents.length === 0) {
          docList.innerHTML = '<div style="color: var(--muted);">暂无文档</div>';
          return;
        }
        docList.innerHTML = data.documents.map(doc => `
          <div class="doc-item">
            <div>
              <div class="doc-name">${escapeHtml(doc.fileName)}</div>
              <div class="doc-meta">${formatDate(doc.createdAt)} · ${formatFileSize(doc.fileSize)}</div>
            </div>
            <div class="toolbar">
              <button class="btn" onclick="selectDoc('${escapeJs(doc.fileName)}','${escapeJs(doc.id || '')}')">预览</button>
              <a class="btn" href="${buildDownloadUrl(doc.fileName, doc.id)}" download>下载</a>
            </div>
          </div>
        `).join('');
      } catch (error) {
        docList.innerHTML = '<div style="color: var(--muted);">加载失败</div>';
      }
    }

    async function selectDoc(fileName, outputId) {
      currentDoc = { fileName, id: outputId };
      renderPreview(fileName, outputId);
      downloadBtn.href = buildDownloadUrl(fileName, outputId);
      downloadBtn.style.display = 'inline-flex';
      openPreviewBtn.style.display = 'inline-flex';
      statusText.textContent = '✅ 已选择文档：' + fileName;
    }

    async function renderPreview(fileName, outputId) {
      previewContent.innerHTML = '<p style="color: var(--muted);">正在加载预览...</p>';
      try {
        const response = await fetch(buildPreviewUrl(fileName, outputId));
        if (!response.ok) {
          throw new Error('预览失败');
        }
        const blob = await response.blob();
        if (currentBlobUrl) {
          URL.revokeObjectURL(currentBlobUrl);
        }
        currentBlobUrl = URL.createObjectURL(blob);
        previewContent.innerHTML = `<iframe class="preview-frame" src="${currentBlobUrl}"></iframe>`;
        metaText.textContent = '项目：-- · 生成时间：' + new Date().toLocaleString('zh-CN');
      } catch (error) {
        previewContent.innerHTML = '<p style="color: var(--muted);">无法渲染预览，请下载查看。</p>';
      }
    }

    window.addEventListener('beforeunload', () => {
      if (currentBlobUrl) {
        URL.revokeObjectURL(currentBlobUrl);
      }
    });

    function buildDownloadUrl(fileName, outputId) {
      if (outputId) {
        return '/api/documents/download/id/' + encodeURIComponent(outputId);
      }
      return '/api/documents/download/' + encodeURIComponent(fileName);
    }

    function buildPreviewUrl(fileName, outputId) {
      if (outputId) {
        return '/api/documents/preview/pdf/id/' + encodeURIComponent(outputId);
      }
      return '/api/documents/preview/pdf/' + encodeURIComponent(fileName);
    }

    function formatFileSize(bytes) {
      if (!bytes) return '0 B';
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function formatDate(dateStr) {
      if (!dateStr) return '--';
      try {
        return new Date(dateStr).toLocaleString('zh-CN');
      } catch {
        return dateStr;
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function escapeJs(text) {
      return String(text).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    }

    loadDocuments();
  </script>
</body>

</html>
