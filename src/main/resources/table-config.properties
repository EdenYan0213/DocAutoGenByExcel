# 表格自动填充配置文件
# Table Auto-Fill Configuration

# ==================== 测试用例 Sheet 识别 ====================
# 用于识别测试用例Sheet的必填列名（只要包含此列即为测试用例Sheet）
testcase.required.column=模块编号

# ==================== 基本信息 Sheet 识别 ====================
# 基本信息Sheet的列结构（第一列，第二列，第三列）
basicinfo.column.tablename=表格名称
basicinfo.column.fieldname=字段名
basicinfo.column.fieldvalue=字段值

# ==================== 列表型 Sheet 识别 ====================
# 列表型Sheet的第一列名称
listdata.column.tablename=表格名称

# ==================== 其他配置 ====================
# 是否启用调试日志
debug.enabled=false

