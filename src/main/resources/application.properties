spring.application.name=DocAutoGenByExcel

# Server Configuration
server.port=8080

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB

# Static Resources
spring.web.resources.static-locations=classpath:/static/


# Storage Configuration
# 存储类型：database（数据库存储，默认）、local（本地存储）或 s3（AWS S3云存储）
storage.type=database

# 是否保存到数据库（即使使用其他存储类型，也可以同时保存到数据库）
storage.save-to-database=true

# AWS S3 Configuration (可选，仅当storage.type=s3时使用)
# aws.s3.bucket=your-bucket-name
# aws.s3.region=us-east-1
# aws.s3.access-key=your-access-key
# aws.s3.secret-key=your-secret-key
# aws.s3.endpoint=https://s3.amazonaws.com

# Database Configuration
# H2 Database (可选，用于开发和测试)
# spring.datasource.url=jdbc:h2:file:./data/docautogen;AUTO_SERVER=TRUE
# spring.datasource.driver-class-name=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=
# spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console

# MySQL Configuration (生产环境使用)
spring.datasource.url=jdbc:mysql://localhost:3306/docautogen?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=your-password
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# PostgreSQL Configuration (可选)
# spring.datasource.url=jdbc:postgresql://localhost:5432/docautogen
# spring.datasource.driver-class-name=org.postgresql.Driver
# spring.datasource.username=postgres
# spring.datasource.password=your-password
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
